version: "3.9"

services:
  # Єдиний локальний PostgreSQL-контейнер для desktop, web і integration tests.
  postgres:
    image: postgres:16
    container_name: car-rental-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: car_rental
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - car_rental_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d car_rental"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # Named volume зберігає дані між рестартами, щоб scripts могли окремо вирішувати, коли робити factory reset.
  car_rental_pg_data:
